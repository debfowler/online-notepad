<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sticky Notepad</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="app">

  <!-- Library Drawer -->
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <span class="drawer-title">Notes Library</span>
      <button class="drawer-close-btn" onclick="toggleDrawer()" title="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="drawer-search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="drawerSearch" placeholder="Search notes…" oninput="renderDrawer()" autocomplete="off"/>
    </div>
    <div class="drawer-filters">
      <button class="filter-btn active" data-filter="all"      onclick="setFilter('all')">All</button>
      <button class="filter-btn"        data-filter="pinned"   onclick="setFilter('pinned')">📌 Pinned</button>
      <button class="filter-btn"        data-filter="archived" onclick="setFilter('archived')">Archive</button>
    </div>
    <div class="drawer-list" id="drawerList"></div>
    <div class="drawer-footer">
      <button class="drawer-footer-btn" onclick="exportBackup()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export Backup
      </button>
      <label class="drawer-footer-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Import Backup
        <input type="file" accept=".json" onchange="importBackup(event)" style="display:none"/>
      </label>
    </div>
  </div>
  <div class="drawer-overlay" id="drawerOverlay" onclick="toggleDrawer()"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <button class="btn-icon" onclick="toggleDrawer()" title="Notes Library">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="logo">✦ Sticky Notes</div>
      <span class="save-status" id="saveStatus">All changes saved</span>
    </div>
    <div class="header-right">
      <button class="btn-icon" onclick="saveFile()" title="Save as .txt (Ctrl+S)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save
      </button>
      <button class="btn-icon" onclick="openFile()" title="Open file">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Open
      </button>
      <button class="btn-icon" onclick="toggleTheme()" title="Toggle theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        Theme
      </button>
    </div>
  </header>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tabs" id="tabs"></div>
    <button class="add-tab-btn" onclick="newNote()" title="New note (Ctrl+T)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-group">
      <button class="tool-btn" onclick="fmt('bold')"          title="Bold (Ctrl+B)"><b>B</b></button>
      <button class="tool-btn" onclick="fmt('italic')"        title="Italic (Ctrl+I)"><i>I</i></button>
      <button class="tool-btn" onclick="fmt('underline')"     title="Underline (Ctrl+U)"><u>U</u></button>
      <button class="tool-btn" onclick="fmt('strikeThrough')" title="Strikethrough"><s>S</s></button>
    </div>
    <div class="divider"></div>
    <div class="toolbar-group">
      <select class="tool-select" onchange="changeFontFamily(this.value)">
        <option value="Lora, serif">Lora</option>
        <option value="'DM Sans', sans-serif">DM Sans</option>
        <option value="'Courier New', monospace">Courier</option>
        <option value="Georgia, serif">Georgia</option>
        <option value="Verdana, sans-serif">Verdana</option>
      </select>
      <select class="tool-select size-select" onchange="changeFontSize(this.value)">
        <option value="12px">12</option>
        <option value="14px">14</option>
        <option value="16px" selected>16</option>
        <option value="18px">18</option>
        <option value="20px">20</option>
        <option value="24px">24</option>
        <option value="32px">32</option>
        <option value="48px">48</option>
      </select>
    </div>
    <div class="divider"></div>
    <div class="toolbar-group">
      <button class="tool-btn" onclick="fmt('justifyLeft')"   title="Left">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/></svg>
      </button>
      <button class="tool-btn" onclick="fmt('justifyCenter')" title="Center">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="6" y1="12" x2="18" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
      </button>
      <button class="tool-btn" onclick="fmt('justifyRight')"  title="Right">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="9" y1="12" x2="21" y2="12"/><line x1="6" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
    <div class="divider"></div>
    <div class="toolbar-group">
      <button class="tool-btn" onclick="fmt('insertUnorderedList')" title="Bullets">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
      </button>
      <button class="tool-btn" onclick="fmt('insertOrderedList')" title="Numbered">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><text x="2" y="8" font-size="7" fill="currentColor" stroke="none">1.</text><text x="2" y="14" font-size="7" fill="currentColor" stroke="none">2.</text><text x="2" y="20" font-size="7" fill="currentColor" stroke="none">3.</text></svg>
      </button>
    </div>
    <div class="divider"></div>
    <div class="toolbar-group">
      <button class="tool-btn" onclick="undoAction()" title="Undo (Ctrl+Z)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
      </button>
      <button class="tool-btn" onclick="redoAction()" title="Redo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 0 1 4-4h12"/></svg>
      </button>
    </div>
    <div class="toolbar-spacer"></div>
    <div class="word-count" id="wordCount">0 words</div>
  </div>

  <!-- Editor -->
  <div class="editor-wrap no-color" id="editorWrap">
    <div class="page no-color" id="page">
      <div id="editor" class="editor" contenteditable="true" spellcheck="true" data-placeholder="Start writing…"></div>
    </div>
  </div>

</div>

<!-- Context Menu — colors + actions all in one -->
<div class="context-menu" id="contextMenu">
  <div class="ctx-color-row" id="ctxColorRow"></div>
  <div class="ctx-divider"></div>
  <button class="ctx-item" onclick="ctxRename()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    Rename
  </button>
  <button class="ctx-item" id="ctxPinBtn" onclick="ctxPin()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
    <span id="ctxPinLabel">Pin Note</span>
  </button>
  <button class="ctx-item" onclick="ctxDuplicate()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    Duplicate
  </button>
  <div class="ctx-divider"></div>
  <button class="ctx-item" onclick="ctxCloseTab()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    Close Tab
  </button>
  <button class="ctx-item" id="ctxArchiveBtn" onclick="ctxArchive()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
    <span id="ctxArchiveLabel">Archive</span>
  </button>
  <button class="ctx-item danger" onclick="ctxDelete()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
    Delete Forever
  </button>
</div>

<input type="file" id="fileInput" accept=".txt,.md,.html" style="display:none" onchange="handleFileOpen(event)"/>
<script src="script.js"></script>
</body>
</html>
